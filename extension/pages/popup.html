<!DOCTYPE html>
<html>
<head>
    <link rel="icon" href="icons/32.png">
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    width: 280px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0a0b;
    color: #f0f0f0;
}
.header {
    padding: 14px 16px 10px;
    display: flex;
    align-items: center;
    gap: 10px;
    background: #111113;
    border-bottom: 1px solid #2a2a2e;
}
.header svg { width: 24px; height: 24px; flex-shrink: 0; }
.header-text h1 { font-size: 15px; font-weight: 700; line-height: 1.2; }
.header-text span { font-size: 10px; color: #71717a; }
.features { padding: 6px 0; max-height: 360px; overflow-y: auto; }
.feat-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 16px;
    transition: background 0.1s;
}
.feat-row:hover { background: rgba(255,255,255,0.03); }
.feat-label { font-size: 12px; }
.toggle { position: relative; width: 34px; height: 18px; flex-shrink: 0; cursor: pointer; }
.toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
.toggle-track {
    position: absolute; inset: 0;
    background: #27272a;
    border: 1px solid #2a2a2e;
    border-radius: 9px;
    transition: background 0.2s, border-color 0.2s;
}
.toggle input:checked + .toggle-track { background: #85d551; border-color: transparent; }
.toggle-thumb {
    position: absolute; top: 2px; left: 2px;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #fff;
    transition: transform 0.2s cubic-bezier(.4,0,.2,1);
    box-shadow: 0 1px 2px rgba(0,0,0,0.3);
}
.toggle input:checked ~ .toggle-thumb { transform: translateX(16px); }

/* Theme Section */
.theme-section { padding: 4px 0; border-top: 1px solid #2a2a2e; }
.theme-label {
    padding: 10px 16px 6px;
    font-size: 10px; font-weight: 600;
    color: #71717a;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}
.theme-grid { display: flex; flex-wrap: wrap; gap: 5px; padding: 4px 16px 10px; }
.theme-chip {
    font-size: 10px; padding: 4px 10px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.08);
    background: #17171a;
    color: #f0f0f0;
    cursor: pointer;
    display: flex; align-items: center; gap: 5px;
    transition: border-color 0.15s, background 0.15s;
    font-family: inherit;
}
.theme-chip:hover { background: #1e1e22; border-color: rgba(255,255,255,0.15); }
.theme-chip.active {
    border-color: #85d551;
    background: rgba(133,213,81,0.1);
    box-shadow: 0 0 6px rgba(133,213,81,0.15);
}
.theme-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
}

/* Footer */
.footer {
    padding: 10px 16px;
    border-top: 1px solid #2a2a2e;
    background: #111113;
    display: flex;
    align-items: center;
    justify-content: space-between;
}
.footer-left {
    display: flex; align-items: center; gap: 6px;
}
.footer-right {
    display: flex; align-items: center; gap: 4px;
}
.footer-btn {
    display: flex; align-items: center; justify-content: center;
    width: 28px; height: 28px;
    background: #17171a; border: 1px solid #2a2a2e;
    border-radius: 6px; cursor: pointer;
    color: #71717a; transition: all 0.15s;
    position: relative;
}
.footer-btn:hover { background: #1e1e22; color: #f0f0f0; border-color: rgba(255,255,255,0.15); }
.footer-btn svg { width: 14px; height: 14px; }
.footer-btn.github:hover { color: #f0f0f0; }
.footer-btn.settings:hover { color: #85d551; border-color: rgba(133,213,81,0.3); }
.footer-btn.update:hover { color: #89b4fa; border-color: rgba(137,180,250,0.3); }
.footer-btn.update.has-update { color: #85d551; border-color: #85d551; animation: rx-pulse 2s infinite; }
.footer-btn.update.checking { opacity: 0.5; pointer-events: none; }
.footer-btn.update.error { color: #f38ba8; border-color: rgba(243,139,168,0.3); }
.footer-version { font-size: 10px; color: #52525b; }
.footer-reload { font-size: 9px; color: #3f3f46; }

/* Update badge */
.update-dot {
    position: absolute; top: -2px; right: -2px;
    width: 8px; height: 8px;
    background: #85d551; border-radius: 50%;
    border: 1.5px solid #111113;
    display: none;
}
.footer-btn.has-update .update-dot { display: block; }

/* Tooltip */
.footer-btn[title]::after {
    content: attr(data-tooltip);
    position: absolute; bottom: calc(100% + 6px); left: 50%;
    transform: translateX(-50%); padding: 4px 8px;
    background: #27272a; color: #f0f0f0;
    font-size: 10px; white-space: nowrap;
    border-radius: 4px; pointer-events: none;
    opacity: 0; transition: opacity 0.15s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
.footer-btn:hover::after { opacity: 1; }

@keyframes rx-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(133,213,81,0.4); }
    50% { box-shadow: 0 0 0 4px rgba(133,213,81,0); }
}

/* Scrollbar */
.features::-webkit-scrollbar { width: 6px; }
.features::-webkit-scrollbar-track { background: transparent; }
.features::-webkit-scrollbar-thumb { background: #27272a; border-radius: 3px; }
.features::-webkit-scrollbar-thumb:hover { background: #3f3f46; }
</style>
</head>
<body>
<div class="header">

</div>

        <button class="footer-btn update" id="btn-update" data-tooltip="Check for Updates">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 11-6.219-8.56"/><polyline points="21 3 21 9 15 9"/></svg>

</html>
