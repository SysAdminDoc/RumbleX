name: E2E (opt-in)

# v3.5.0 — Opt-in Playwright suite. Doesn't run on every push or PR (avoids
# burning CI minutes on the ~200 MB Chromium download). Manually dispatched
# or fires on demand once we're ready to commit to the always-on runtime.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright (Chromium only)
        run: |
          npm install --no-audit --no-fund
          npx playwright install chromium --with-deps

      - name: Fetch mux.js (extension build prereq)
        run: |
          cd extension && bash build.sh

      - name: Run E2E suite
        run: npm run test:e2e
        env:
          CI: '1'

      - name: Accessibility audit (axe-core)
        run: npm run test:e2e:a11y
        env:
          CI: '1'

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
