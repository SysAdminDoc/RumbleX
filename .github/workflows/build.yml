name: Build & Release

on:
  # v3.4 — also fire on every push to main + every PR so the test job runs
  # on every change, not only on release tags.
  workflow_dispatch:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    # v3.4 — Selector regression harness. Runs on every push and PR; gates
    # the build job below so a Rumble-DOM-shift PR can't merge unnoticed.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Shell script line endings
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const { execFileSync } = require('child_process');
          const files = execFileSync('git', ['ls-files', '*.sh'], { encoding: 'utf8' })
            .split(/\r?\n/)
            .filter(Boolean);
          const bad = files.filter((file) => fs.readFileSync(file).includes(13));
          if (bad.length) {
            console.error('Shell scripts must use LF line endings:\n' + bad.join('\n'));
            process.exit(1);
          }
          NODE
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Selector regression harness
        run: python test_selectors.py
      - name: JS syntax check
        run: |
          node --check scripts/check-dom-sinks.js
          node --check extension/content.js
          node --check extension/background.js
          node --check extension/offscreen.js
          node --check extension/pages/popup.js
          node --check extension/pages/options.js
      - name: DOM sink guard
        run: node scripts/check-dom-sinks.js
      - name: Manifest privacy guard
        run: node scripts/check-manifest-privacy.js
      - name: Catalog parity (210/210/210)
        run: |
          node -e "
            const fs = require('fs');
            function ext(f) {
              const t = fs.readFileSync(f, 'utf8');
              const s = f.includes('content.js') ? t.indexOf('_defaults: {') : t.indexOf('const DEFAULTS = {');
              const e = f.includes('content.js') ? t.indexOf('    },', s) : t.indexOf('};', s);
              const b = t.slice(s, e);
              const k = new Set();
              for (const m of b.matchAll(/^\s+(\w+):/gm)) k.add(m[1]);
              k.delete('_defaults');
              return k;
            }
            const c = ext('extension/content.js');
            const p = ext('extension/pages/popup.js');
            const o = ext('extension/pages/options.js');
            if (c.size !== p.size || c.size !== o.size) {
              console.error('Catalog parity FAIL — content:', c.size, 'popup:', p.size, 'options:', o.size);
              process.exit(1);
            }
            console.log('Catalog parity OK at', c.size);
          "

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build release packages
        run: |
          cd extension
          bash build.sh

      - name: Verify release checksums
        run: sha256sum -c SHA256SUMS.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RumbleX-extension
          path: |
            RumbleX-chrome.zip
            RumbleX-firefox.zip
            SHA256SUMS.txt

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        # v3.26.0 — `gh release upload` only uploads to an EXISTING release;
        # it doesn't create one. Older runs of this workflow have been
        # uploading nothing because the release wasn't being created first.
        # Now: create-if-missing (idempotent via `|| true`), then upload.
        run: |
          set -e
          gh release view "${{ github.ref_name }}" >/dev/null 2>&1 \
            || gh release create "${{ github.ref_name }}" \
                --title "RumbleX ${{ github.ref_name }}" \
                --notes "See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for release notes."
          gh release upload "${{ github.ref_name }}" RumbleX-chrome.zip RumbleX-firefox.zip SHA256SUMS.txt --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
