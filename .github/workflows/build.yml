name: Build & Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build ZIP
        run: |
          cd extension
          zip -r ../${{ github.event.repository.name }}-${{ github.ref_name || 'dev' }}.zip . -x "*.git*" "*.md" "*.py" "*.bak" "*.mhtml" "userscript/*" "*.sh"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RumbleX-extension
          path: "*.zip"

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        run: gh release upload ${{ github.ref_name }} *.zip --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
